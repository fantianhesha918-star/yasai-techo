<style>
  :root {
    --bg-outer: #ece7d9;
    --app-bg: #faf8f1;
    --card-bg: #ffffff;
    --ink: #262b1f;
    --ink-soft: #6f7663;
    --line: #e3ddc9;
    --accent: #4d7a3f;
    --accent-contrast: #ffffff;
    --grow: #c9703f;
    --grow-soft: #f7e9df;
    --season-spring-summer: #7a9a52;
    --season-summer-autumn: #3f6b4d;
    --season-autumn-spring: #b3803f;
    --season-year-round: #7c6a9e;
    --watch-soft: #e9eef2;
    --watch-ink: #47617a;
    --offgrade-soft: #f6ede0;
    --offgrade-ink: #93662f;
    --shadow-card: 0 1px 2px rgba(38,43,31,0.06), 0 3px 10px rgba(38,43,31,0.06);
    --shadow-frame: 0 30px 70px rgba(38,43,31,0.28);
    --shadow-sheet: 0 -8px 30px rgba(38,43,31,0.18);
    color-scheme: light;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-outer: #0e0f0a;
      --app-bg: #181a13;
      --card-bg: #23261a;
      --ink: #ece8da;
      --ink-soft: #a4a894;
      --line: #34381f;
      --accent: #8fb377;
      --accent-contrast: #14170e;
      --grow: #e08b5e;
      --grow-soft: #35291f;
      --season-spring-summer: #8fb377;
      --season-summer-autumn: #6fa085;
      --season-autumn-spring: #c79a63;
      --season-year-round: #a6a4cf;
      --watch-soft: #202832;
      --watch-ink: #9dc0dc;
      --offgrade-soft: #332a1c;
      --offgrade-ink: #d1a76f;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.35), 0 3px 12px rgba(0,0,0,0.3);
      --shadow-frame: 0 30px 70px rgba(0,0,0,0.5);
      --shadow-sheet: 0 -8px 30px rgba(0,0,0,0.4);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg-outer: #0e0f0a;
    --app-bg: #181a13;
    --card-bg: #23261a;
    --ink: #ece8da;
    --ink-soft: #a4a894;
    --line: #34381f;
    --accent: #8fb377;
    --accent-contrast: #14170e;
    --grow: #e08b5e;
    --grow-soft: #35291f;
    --season-spring-summer: #8fb377;
    --season-summer-autumn: #6fa085;
    --season-autumn-spring: #c79a63;
    --season-year-round: #a6a4cf;
    --watch-soft: #202832;
    --watch-ink: #9dc0dc;
    --offgrade-soft: #332a1c;
    --offgrade-ink: #d1a76f;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.35), 0 3px 12px rgba(0,0,0,0.3);
    --shadow-frame: 0 30px 70px rgba(0,0,0,0.5);
    --shadow-sheet: 0 -8px 30px rgba(0,0,0,0.4);
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg-outer: #ece7d9;
    --app-bg: #faf8f1;
    --card-bg: #ffffff;
    --ink: #262b1f;
    --ink-soft: #6f7663;
    --line: #e3ddc9;
    --accent: #4d7a3f;
    --accent-contrast: #ffffff;
    --grow: #c9703f;
    --grow-soft: #f7e9df;
    --season-spring-summer: #7a9a52;
    --season-summer-autumn: #3f6b4d;
    --season-autumn-spring: #b3803f;
    --season-year-round: #7c6a9e;
    --watch-soft: #e9eef2;
    --watch-ink: #47617a;
    --offgrade-soft: #f6ede0;
    --offgrade-ink: #93662f;
    --shadow-card: 0 1px 2px rgba(38,43,31,0.06), 0 3px 10px rgba(38,43,31,0.06);
    --shadow-frame: 0 30px 70px rgba(38,43,31,0.28);
    --shadow-sheet: 0 -8px 30px rgba(38,43,31,0.18);
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg-outer);
    color: var(--ink);
    font-family: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
    line-height: 1.6;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  button { font-family: inherit; }

  /* ===== アプリフレーム ===== */
  .app-frame {
    position: relative;
    width: 100%;
    max-width: 430px;
    height: 100vh;
    height: 100dvh;
    background: var(--app-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 431px) {
    body { padding: 32px 16px; }
    .app-frame {
      min-height: 780px;
      height: 844px;
      border-radius: 34px;
      box-shadow: var(--shadow-frame);
      border: 1px solid rgba(0,0,0,0.06);
    }
  }

  .app-header {
    flex: 0 0 auto;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--line);
    background: var(--app-bg);
  }
  .app-header .brand-mark {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--accent);
    color: var(--accent-contrast);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .app-header .brand-mark svg { width: 19px; height: 19px; }
  .app-header h1 {
    font-size: 1.05rem;
    margin: 0;
    letter-spacing: 0.01em;
  }
  .app-header .brand-sub {
    font-size: 0.72rem;
    color: var(--ink-soft);
    margin: 1px 0 0;
  }

  /* ===== スクロール本体 ===== */
  .app-body {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 0 20px;
  }
  .view { display: none; padding: 0 18px; }
  .view.is-active { display: block; }

  /* 検索ボックス */
  .search-row { margin-bottom: 10px; }
  .search-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card-bg);
    color: var(--ink);
    font-size: 0.88rem;
  }
  .search-input::placeholder { color: var(--ink-soft); }
  .search-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* 季節フィルターチップ */
  .chip-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 0 14px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    font-size: 0.82rem;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card-bg);
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.is-active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
    font-weight: 700;
  }
  .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* 野菜リスト */
  .veg-list { display: flex; flex-direction: column; gap: 10px; }
  .veg-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 11px 14px;
    box-shadow: var(--shadow-card);
    cursor: pointer;
  }
  .veg-row:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .monogram {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 1.05rem;
    color: #fff;
  }
  .veg-row-main { flex: 1 1 auto; min-width: 0; }
  .veg-row-name {
    font-size: 0.98rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .veg-row-sub {
    display: block;
    font-size: 0.76rem;
    color: var(--ink-soft);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .grow-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--grow);
    flex: 0 0 auto;
  }
  .veg-row-estimate {
    display: block;
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--grow);
    margin-top: 3px;
  }
  .row-chevron { flex: 0 0 auto; color: var(--ink-soft); }
  .row-chevron svg { width: 16px; height: 16px; display: block; }

  .empty-state {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.86rem;
    padding: 60px 20px;
  }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: 0.5; }

  .section-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 4px 0 10px;
  }

  /* コツタブ */
  .tip-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow-card);
    padding: 13px 15px;
    font-size: 0.88rem;
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tip-card .tip-index {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-contrast);
    font-size: 0.72rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  /* ===== 詳細シート ===== */
  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 20, 12, 0.42);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: 20;
  }
  .sheet-overlay.is-open { opacity: 1; pointer-events: auto; }

  .detail-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    max-height: 88%;
    background: var(--app-bg);
    border-radius: 22px 22px 0 0;
    box-shadow: var(--shadow-sheet);
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(.2,.8,.2,1);
    z-index: 21;
    display: flex;
    flex-direction: column;
  }
  .sheet-overlay.is-open .detail-sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    border-radius: 3px;
    background: var(--line);
    margin: 10px auto 4px;
    flex: 0 0 auto;
  }
  .sheet-head {
    flex: 0 0 auto;
    padding: 6px 20px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--line);
  }
  .sheet-head .titles h2 { font-size: 1.25rem; margin: 0; }
  .sheet-head .titles .family-tag {
    display: inline-block;
    margin-top: 5px;
    font-size: 0.75rem;
    padding: 2px 9px;
    border-radius: 999px;
    color: #fff;
  }
  .sheet-close {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--line);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .sheet-close svg { width: 15px; height: 15px; }

  .sheet-body {
    overflow-y: auto;
    padding: 16px 20px 24px;
  }

  .grow-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--grow);
    background: transparent;
    color: var(--grow);
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .grow-toggle svg { width: 17px; height: 17px; }
  .grow-toggle.is-growing {
    background: var(--grow);
    color: #fff;
  }

  .planted-block {
    background: var(--grow-soft);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .planted-label {
    display: block;
    font-size: 0.76rem;
    font-weight: 700;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .planted-input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--card-bg);
    color: var(--ink);
    font-size: 0.88rem;
    font-family: inherit;
  }
  .planted-estimate {
    margin: 8px 0 0;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--grow);
  }
  .planted-hint {
    margin: 8px 0 0;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .fact-grid {
    display: grid;
    grid-template-columns: 5.6em 1fr;
    row-gap: 7px;
    column-gap: 10px;
    margin: 0 0 16px;
    font-size: 0.86rem;
  }
  .fact-row { display: contents; }
  .fact-grid dt { color: var(--ink-soft); margin: 0; }
  .fact-grid dd { margin: 0; }

  .note-block {
    border-radius: 12px;
    padding: 11px 13px;
    font-size: 0.86rem;
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .note-label {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-right: 0.6em;
    border-radius: 4px;
    padding: 0 5px;
  }
  .note-watch { background: var(--watch-soft); }
  .note-watch .note-label { color: var(--watch-ink); border: 1px solid var(--watch-ink); }
  .note-offgrade { background: var(--offgrade-soft); }
  .note-offgrade .note-label { color: var(--offgrade-ink); border: 1px solid var(--offgrade-ink); }
  .note-tip { background: rgba(77,122,63,0.1); }
  .note-tip .note-label { color: var(--accent); border: 1px solid var(--accent); }

  /* 成長ステージ チェックリスト */
  .stage-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 13px 14px 4px;
    margin-bottom: 14px;
  }
  .stage-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .stage-progress {
    font-size: 0.76rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    background: rgba(77,122,63,0.12);
    border-radius: 999px;
    padding: 2px 9px;
  }
  .stage-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-top: 1px solid var(--line);
    cursor: pointer;
  }
  .stage-item:first-of-type { border-top: none; }
  .stage-checkbox {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
  }
  .stage-box {
    flex: 0 0 auto;
    width: 20px; height: 20px;
    margin-top: 1px;
    border-radius: 6px;
    border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: transparent;
  }
  .stage-box svg { width: 13px; height: 13px; }
  .stage-item.is-done .stage-box {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-contrast);
  }
  .stage-checkbox:focus-visible + .stage-box { outline: 2px solid var(--accent); outline-offset: 2px; }
  .stage-text {
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .stage-name {
    display: block;
    font-weight: 700;
    font-size: 0.8rem;
    margin-bottom: 2px;
  }
  .stage-item.is-done .stage-text {
    color: var(--ink-soft);
    text-decoration: line-through;
    text-decoration-color: var(--ink-soft);
    text-decoration-thickness: 1.5px;
  }
  .stage-item.is-done .stage-name { text-decoration: none; }

  /* ===== ボトムナビ ===== */
  .bottom-nav {
    flex: 0 0 auto;
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--app-bg);
    padding: 6px 6px calc(6px + env(safe-area-inset-bottom, 0px));
  }
  .nav-btn {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px 6px;
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 0.68rem;
    cursor: pointer;
    border-radius: 10px;
  }
  .nav-btn svg { width: 21px; height: 21px; }
  .nav-btn.is-active { color: var(--accent); font-weight: 700; }
  .nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  @media (prefers-reduced-motion: reduce) {
    .detail-sheet, .sheet-overlay { transition: none; }
  }
</style>

<div class="app-frame">

  <header class="app-header">
    <span class="brand-mark">

    </span>
    <div>

  <nav class="bottom-nav">

  <div class="sheet-overlay" id="sheet-overlay">

          <h2 id="sheet-name"></h2>
          <span class="family-tag" id="sheet-family"></span>
        </div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="sheet-body" id="sheet-body"></div>
    </div>
  </div>

  var SEASON_COLOR_VARS = {
    "spring-summer": "--season-spring-summer",

  var STORAGE_KEY_V1 = "yasai-techo-growing-v1";
  var STORAGE_KEY = "yasai-techo-growing-v2";

  function loadGrowingData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
      var v1raw = localStorage.getItem(STORAGE_KEY_V1);
      if (v1raw) {
        var ids = JSON.parse(v1raw);
        var migrated = {};
        ids.forEach(function (id) { migrated[id] = { plantedAt: null }; });
        return migrated;
      }
    } catch (e) {}
    return {};
  }
  function saveGrowingData(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {}
  }

  var STAGE_STORAGE_KEY = "yasai-techo-stages-v1";

  function loadStageChecks() {
    try {
      var raw = localStorage.getItem(STAGE_STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }
  function saveStageChecks(list) {
    try {
      localStorage.setItem(STAGE_STORAGE_KEY, JSON.stringify(list));

  function esc(s) {
    var div = document.createElement("div");
    div.textContent = s;

  function seasonColorVar(key) {
    return "var(" + SEASON_COLOR_VARS[key] + ")";

  function findVeg(id) {
    for (var i = 0; i < APP_DATA.vegetables.length; i++) {
      if (APP_DATA.vegetables[i].id === id) return APP_DATA.vegetables[i];
    }
    return null;

  function harvestEstimateText(veg, plantedAtStr) {
    var planted = new Date(plantedAtStr + "T00:00:00");
    if (isNaN(planted.getTime())) return "";
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var minDate = new Date(planted); minDate.setDate(minDate.getDate() + veg.daysMin);
    var maxDate = new Date(planted); maxDate.setDate(maxDate.getDate() + veg.daysMax);
    var fmt = function (d) { return (d.getMonth() + 1) + "月" + d.getDate() + "日"; };
    if (today < minDate) {
      var daysLeft = Math.round((minDate - today) / 86400000);
      return "収穫目安 " + fmt(minDate) + "〜" + fmt(maxDate) + "（あと約" + daysLeft + "日）";
    } else if (today <= maxDate) {
      return "そろそろ収穫時期です（目安〜" + fmt(maxDate) + "）";
    }
    return "収穫目安を過ぎています（目安〜" + fmt(maxDate) + "）";
  }

    return (

          '<span class="veg-row-sub">' + esc(veg.family) + '｜' + esc(veg.harvest) + '収穫</span>' +

    });
    row.innerHTML = html;
    row.querySelectorAll(".chip").forEach(function (btn) {
      btn.addEventListener("click", function () {
        currentFilter = btn.getAttribute("data-filter");
        renderChips();
        renderHomeList();
      });
    });
  }

  function renderHomeList() {
    var list = APP_DATA.vegetables.filter(function (v) {
      var matchesFilter = currentFilter === "all" || v.seasonKey === currentFilter;
      var matchesSearch = !currentSearch || v.name.indexOf(currentSearch) !== -1;
      return matchesFilter && matchesSearch;
    });
    var container = document.getElementById("home-list");
    if (list.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>該当する野菜が見つかりませんでした。</p></div>';
      return;
    }
    container.innerHTML = list.map(function (v) { return vegRowHTML(v); }).join("");
    bindRowOpeners(container);
  }

  function renderGrowingList() {
    var container = document.getElementById("growing-list");
    var list = APP_DATA.vegetables.filter(function (v) { return !!growingData[v.id]; });
    if (list.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c-5 0-8-4-8-9a7 7 0 0 1 7-7c1 3 1 5 1 5s3-1 3-6c4 1 6 4.5 6 8.5 0 5-4 8.5-9 8.5z"/></svg>' +
          '<p>まだ栽培中の野菜がありません。<br>野菜を選んで「栽培中にする」を押すとここに表示されます。</p>' +
        '</div>';
      return;
    }
    container.innerHTML = '<p class="section-label">栽培中の野菜（' + list.length + '）</p><div class="veg-list">' +
      list.map(function (v) { return vegRowHTML(v, { showHarvestEstimate: true }); }).join("") + '</div>';
    bindRowOpeners(container);
  }

  function bindRowOpeners(container) {
    container.querySelectorAll("[data-open]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        openDetail(btn.getAttribute("data-open"));
      });
    });
  }

  function renderTips() {
    var container = document.getElementById("tips-list");
    container.innerHTML = APP_DATA.commonTips.map(function (tip, i) {
      return '<div class="tip-card"><span class="tip-index">' + (i + 1) + '</span><span>' + esc(tip) + '</span></div>';
    }).join("");
  }

  var FIELD_LABELS = [
    ["sow", "種まき・植え付け"],
    ["harvest", "収穫時期"],
    ["sun", "日当たり"],
    ["water", "水やり"],
    ["soil_ph", "土の最適pH"],
    ["pot", "プランター"],
    ["pests", "主な病害虫"]
  ];

  function stageDoneCount(veg) {
    return veg.stages.filter(function (s, i) { return stageCheckSet.has(stageKey(veg.id, i)); }).length;
  }

  function stagesHTML(veg) {
    if (!veg.stages || veg.stages.length === 0) return "";
    var items = veg.stages.map(function (s, i) {
      var key = stageKey(veg.id, i);
      var done = stageCheckSet.has(key);
      return (
        '<label class="stage-item' + (done ? ' is-done' : '') + '" data-stage-key="' + esc(key) + '">' +
          '<input type="checkbox" class="stage-checkbox"' + (done ? ' checked' : '') + ' />' +
          '<span class="stage-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>' +
          '<span class="stage-text"><span class="stage-name">' + esc(s.stage) + '</span>' + esc(s.point) + '</span>' +
        '</label>'
      );
    }).join("");
    return (
      '<div class="stage-card">' +
        '<div class="stage-card-head">' +
          '<span class="section-label" style="margin:0;">成長ステージのポイント</span>' +
          '<span class="stage-progress" id="stage-progress">' + stageDoneCount(veg) + ' / ' + veg.stages.length + '</span>' +
        '</div>' +
        items +
      '</div>'
    );
  }

  function openDetail(id) {
    var veg = findVeg(id);
    if (!veg) return;
    document.getElementById("sheet-name").textContent = veg.name;
    var familyTag = document.getElementById("sheet-family");
    familyTag.textContent = veg.family;
    familyTag.style.background = seasonColorVar(veg.seasonKey);

    var growing = growingData[veg.id];
    var factsHTML = FIELD_LABELS.map(function (f) {
      return '<div class="fact-row"><dt>' + f[1] + '</dt><dd>' + esc(veg[f[0]]) + '</dd></div>';
    }).join("");

    var plantedBlockHTML = "";
    if (growing) {
      var estimateText = growing.plantedAt ? harvestEstimateText(veg, growing.plantedAt) : "";
      plantedBlockHTML =
        '<div class="planted-block">' +
          '<label class="planted-label" for="planted-input">植え付け日</label>' +
          '<input type="date" id="planted-input" class="planted-input" value="' + esc(growing.plantedAt || "") + '" />' +
          (estimateText
            ? '<p class="planted-estimate">' + esc(estimateText) + '</p>'
            : '<p class="planted-hint">日付を入れると収穫目安（植え付けから約' + veg.daysMin + '〜' + veg.daysMax + '日後・地域や天候で前後します）を表示します。</p>') +
        '</div>';
    }

    document.getElementById("sheet-body").innerHTML =
      '<button class="grow-toggle' + (growing ? ' is-growing' : '') + '" id="grow-toggle-btn" type="button">' +
        '<svg viewBox="0 0 24 24" fill="' + (growing ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c-5 0-8-4-8-9a7 7 0 0 1 7-7c1 3 1 5 1 5s3-1 3-6c4 1 6 4.5 6 8.5 0 5-4 8.5-9 8.5z"/></svg>' +
        '<span>' + (growing ? '栽培中にしています' : '栽培中にする') + '</span>' +
      '</button>' +
      plantedBlockHTML +
      '<dl class="fact-grid">' + factsHTML + '</dl>' +
      stagesHTML(veg) +
      '<p class="note-block note-watch"><span class="note-label">観察</span>' + esc(veg.watch) + '</p>' +
      '<p class="note-block note-offgrade"><span class="note-label">規格外</span>' + esc(veg.offgrade) + '</p>' +
      '<p class="note-block note-tip"><span class="note-label">コツ</span>' + esc(veg.tips) + '</p>';

    document.getElementById("grow-toggle-btn").addEventListener("click", function () {
      toggleGrowing(veg.id);
    });

    if (growing) {
      document.getElementById("planted-input").addEventListener("change", function (e) {
        setPlantedAt(veg.id, e.target.value);
        openDetail(veg.id);
        renderGrowingList();
      });
    }

    document.getElementById("sheet-body").querySelectorAll(".stage-item").forEach(function (label) {
      var checkbox = label.querySelector(".stage-checkbox");
      checkbox.addEventListener("change", function () {
        var key = label.getAttribute("data-stage-key");
        if (checkbox.checked) {
          stageCheckSet.add(key);
          label.classList.add("is-done");
        } else {
          stageCheckSet.delete(key);
          label.classList.remove("is-done");
        }
        saveStageChecks(Array.from(stageCheckSet));
        var progressEl = document.getElementById("stage-progress");
        if (progressEl) progressEl.textContent = stageDoneCount(veg) + " / " + veg.stages.length;
      });
    });

    document.getElementById("sheet-overlay").classList.add("is-open");
  }

  function toggleGrowing(id) {
    if (growingData[id]) {
      delete growingData[id];
    } else {
      growingData[id] = { plantedAt: null };
    }
    saveGrowingData(growingData);
    openDetail(id);
    renderHomeList();
    renderGrowingList();
  }

  function setPlantedAt(id, dateStr) {
    if (!growingData[id]) return;
    growingData[id].plantedAt = dateStr || null;
    saveGrowingData(growingData);
  }

  function closeDetail() {
    document.getElementById("sheet-overlay").classList.remove("is-open");
  }

  document.getElementById("veg-search").addEventListener("input", function (e) {
    currentSearch = e.target.value.trim();
    renderHomeList();
  });

  document.getElementById("sheet-close").addEventListener("click", closeDetail);
  document.getElementById("sheet-overlay").addEventListener("click", function (e) {
    if (e.target === this) closeDetail();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeDetail();
  });

  var HEADER_TEXT = {
    home: ["やさい手帳", "季節の野菜を育てよう"],
    growing: ["栽培中の野菜", "育てている野菜をチェック"],
    tips: ["共通の栽培のコツ", "どの野菜にも役立つ基本"]
  };

  document.querySelectorAll(".nav-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      currentNav = btn.getAttribute("data-nav");
      document.querySelectorAll(".nav-btn").forEach(function (b) { b.classList.remove("is-active"); });
      btn.classList.add("is-active");
      document.querySelectorAll(".view").forEach(function (v) {
        v.classList.toggle("is-active", v.getAttribute("data-view") === currentNav);
      });
      document.getElementById("header-title").textContent = HEADER_TEXT[currentNav][0];
      document.getElementById("header-sub").textContent = HEADER_TEXT[currentNav][1];
      if (currentNav === "growing") renderGrowingList();
    });
  });

  renderChips();
  renderHomeList();
  renderGrowingList();
  renderTips();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    });
  }
</script>
